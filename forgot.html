<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center min-h-screen bg-gradient-to-br from-indigo-700 to-cyan-500">

<div class="bg-white/20 p-8 rounded-xl w-96 backdrop-blur-xl border border-white/30 text-white">

  <h2 class="text-2xl font-bold text-center mb-6">Reset Password</h2>

  <!-- Username -->
  <input id="user" type="text" placeholder="Enter Username"
    class="w-full mb-3 p-3 rounded bg-white/10 border border-white/30">

  <!-- Send OTP -->
  <button onclick="sendOTP()"
    class="w-full mb-4 bg-yellow-300 text-black font-bold py-2 rounded">
    Send OTP
  </button>

  <!-- OTP -->
  <input id="otp" type="text" placeholder="Enter OTP"
    class="w-full mb-3 p-3 rounded bg-white/10 border border-white/30">

  <!-- New Password -->
  <input id="newPass" type="password" placeholder="New Password"
    class="w-full mb-4 p-3 rounded bg-white/10 border border-white/30">

  <!-- Reset Button -->
  <button onclick="resetPass()"
    class="w-full bg-cyan-300 text-black font-bold py-2 rounded hover:bg-cyan-200">
    Reset Password
  </button>

  <p class="text-center mt-4 text-sm">
    <a href="index.html" class="text-cyan-200 underline">Back to Login</a>
  </p>

</div>

<script>

let generatedOTP = null;

/* SEND OTP */
function sendOTP() {
  const user = document.getElementById("user").value;
  const savedUser = localStorage.getItem("user");

  if (!user) {
    alert("Enter username!");
    return;
  }

  if (user !== savedUser) {
    alert("User not found!");
    return;
  }

  // generate OTP
  generatedOTP = Math.floor(1000 + Math.random() * 9000);

  alert("Your OTP is: " + generatedOTP); // simulate OTP (frontend only)
}

/* RESET PASSWORD */
function resetPass() {
  const otp = document.getElementById("otp").value;
  const newPass = document.getElementById("newPass").value;

  if (!generatedOTP) {
    alert("Please generate OTP first!");
    return;
  }

  if (parseInt(otp) !== generatedOTP) {
    alert("Invalid OTP!");
    return;
  }

  if (!newPass) {
    alert("Enter new password!");
    return;
  }

  localStorage.setItem("pass", newPass);

  alert("Password updated successfully!");
  window.location.href = "index.html";
}

</script>

</body>
</html>
